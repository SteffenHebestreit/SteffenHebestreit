<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071c1c"/>
      <stop offset="50%" stop-color="#051515"/>
      <stop offset="100%" stop-color="#030d0d"/>
    </linearGradient>
    <linearGradient id="teal_h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a7a70"/>
      <stop offset="100%" stop-color="#00e5cc"/>
    </linearGradient>
    <linearGradient id="teal_v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5cc"/>
      <stop offset="100%" stop-color="#0a7a70"/>
    </linearGradient>
    <linearGradient id="sh_fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f0d8"/>
      <stop offset="100%" stop-color="#008a7a"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dotgrid" x="0" y="0" width="25" height="25" patternUnits="userSpaceOnUse">
      <circle cx="12.5" cy="12.5" r="0.8" fill="#00d4b8" opacity="0.14"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="160" fill="url(#bg)"/>
  <!-- Dot grid overlay -->
  <rect width="900" height="160" fill="url(#dotgrid)"/>

  <!-- Right-side circuit decorations -->
  <g opacity="0.22">
    <line x1="680" y1="25" x2="840" y2="25" stroke="#00d4b8" stroke-width="0.7"/>
    <line x1="840" y1="25" x2="840" y2="70" stroke="#00d4b8" stroke-width="0.7"/>
    <circle cx="840" cy="25" r="2.5" fill="none" stroke="#00d4b8" stroke-width="0.9"/>
    <circle cx="680" cy="25" r="1.8" fill="#00d4b8"/>
    <line x1="700" y1="135" x2="870" y2="135" stroke="#00d4b8" stroke-width="0.7"/>
    <circle cx="870" cy="135" r="2.5" fill="none" stroke="#00d4b8" stroke-width="0.9"/>
    <circle cx="700" cy="135" r="1.5" fill="#00d4b8"/>
    <line x1="760" y1="25" x2="760" y2="135" stroke="#00d4b8" stroke-width="0.5" stroke-dasharray="4,6"/>
    <circle cx="760" cy="80" r="2.2" fill="none" stroke="#00d4b8" stroke-width="0.8"/>
    <circle cx="870" cy="80" r="1.5" fill="#00d4b8"/>
    <line x1="760" y1="80" x2="870" y2="80" stroke="#00d4b8" stroke-width="0.6"/>
  </g>
  <!-- Scattered particles -->
  <circle cx="810" cy="45" r="1.2" fill="#00d4b8" opacity="0.3"/>
  <circle cx="875" cy="55" r="0.8" fill="#00d4b8" opacity="0.22"/>
  <circle cx="790" cy="100" r="1.5" fill="#00d4b8" opacity="0.2"/>
  <circle cx="855" cy="112" r="1" fill="#00d4b8" opacity="0.25"/>
  <circle cx="828" cy="68" r="0.8" fill="#00d4b8" opacity="0.2"/>
  <circle cx="885" cy="95" r="1.2" fill="#00d4b8" opacity="0.18"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="3" height="160" fill="url(#teal_v)"/>

  <!-- Hexagon outer (r=52, center 83,80) -->
  <!-- top:83,28  tr:128,54  br:128,106  bot:83,132  bl:38,106  tl:38,54 -->
  <polygon points="83,28 128,54 128,106 83,132 38,106 38,54"
           fill="none" stroke="url(#teal_h)" stroke-width="1.8" opacity="0.75"
           filter="url(#softglow)"/>
  <!-- Hexagon inner (r=40) -->
  <!-- top:83,40  tr:118,60  br:118,100  bot:83,120  bl:48,100  tl:48,60 -->
  <polygon points="83,40 118,60 118,100 83,120 48,100 48,60"
           fill="none" stroke="url(#teal_h)" stroke-width="0.9" opacity="0.35"/>

  <!-- Hex vertex accent dots -->
  <circle cx="83"  cy="28"  r="2.5" fill="#00e5cc" opacity="0.7" filter="url(#softglow)"/>
  <circle cx="128" cy="54"  r="2"   fill="#00d4b8" opacity="0.55"/>
  <circle cx="128" cy="106" r="2"   fill="#00d4b8" opacity="0.55"/>
  <circle cx="83"  cy="132" r="2.5" fill="#00e5cc" opacity="0.7" filter="url(#softglow)"/>
  <circle cx="38"  cy="106" r="2"   fill="#00d4b8" opacity="0.55"/>
  <circle cx="38"  cy="54"  r="2"   fill="#00d4b8" opacity="0.55"/>

  <!-- SH monogram -->
  <text x="83" y="80"
        font-family="'Arial Black', Impact, sans-serif"
        font-weight="900"
        font-size="36"
        fill="url(#sh_fill)"
        text-anchor="middle"
        dominant-baseline="central"
        filter="url(#glow)"
        opacity="0.92">SH</text>

  <!-- Vertical separator -->
  <line x1="155" y1="28" x2="155" y2="132" stroke="#00d4b8" stroke-width="0.8" opacity="0.25"/>

  <!-- Name -->
  <text x="175" y="67"
        font-family="'Segoe UI', Arial, sans-serif"
        font-weight="700"
        font-size="27"
        fill="#ffffff"
        letter-spacing="3"
        opacity="0.96">STEFFEN HEBESTREIT</text>

  <!-- Tagline -->
  <text x="177" y="95"
        font-family="'Segoe UI', Arial, sans-serif"
        font-weight="400"
        font-size="12"
        fill="#00d4b8"
        letter-spacing="6.5"
        opacity="0.9">FULL-STACK  ·  MICROSERVICES  ·  AI</text>

  <!-- Sub-tagline -->
  <text x="177" y="117"
        font-family="'Segoe UI', Arial, sans-serif"
        font-weight="300"
        font-size="11"
        fill="#7abbb6"
        letter-spacing="1.8"
        opacity="0.72">Software Engineer  ·  Full-Stack  ·  Microservices  ·  AI</text>

  <!-- Bottom accent line -->
  <rect y="157" width="900" height="3" fill="url(#teal_h)"/>
</svg>
